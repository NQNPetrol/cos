name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: Testing

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: cos_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping -h localhost -u root -ppassword" --health-interval=10s --health-timeout=5s --health-retries=5

    env:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: cos_test
      DB_USERNAME: root
      DB_PASSWORD: password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm i

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      # Solo en el runner de GitHub (VM efímera): no modifica tu .env local ni el servidor de deploy.
      # .env.example usa sqlite sin archivo; además hay migraciones solo compatibles con MySQL.
      # Las variables del job no siempre pisan el .env al cargar Laravel, así que fijamos MySQL aquí.
      - name: Configure .env for CI MySQL
        run: |
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          grep -q '^DB_HOST=' .env && sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env || echo 'DB_HOST=127.0.0.1' >> .env
          grep -q '^DB_PORT=' .env && sed -i 's/^DB_PORT=.*/DB_PORT=3306/' .env || echo 'DB_PORT=3306' >> .env
          grep -q '^DB_DATABASE=' .env && sed -i 's/^DB_DATABASE=.*/DB_DATABASE=cos_test/' .env || echo 'DB_DATABASE=cos_test' >> .env
          grep -q '^DB_USERNAME=' .env && sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env || echo 'DB_USERNAME=root' >> .env
          grep -q '^DB_PASSWORD=' .env && sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=password/' .env || echo 'DB_PASSWORD=password' >> .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: cos_test
          DB_USERNAME: root
          DB_PASSWORD: password
        run: php artisan migrate --force

      # env a nivel de step: mitiga variables DB_* del entorno GitHub "Testing" que pisan el job.
      - name: Run Tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: cos_test
          DB_USERNAME: root
          DB_PASSWORD: password
        run: ./vendor/bin/pest